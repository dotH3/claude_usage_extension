<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude Usage</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #f5f0eb;
      --bg-card:   #ede8e2;
      --border:    #d6cfc8;
      --text:      #1a1a1a;
      --muted:     #7a7068;
      --faint:     #c4bbb1;
      --accent:    #c96442;   /* coral — Claude brand */
      --warn:      #b45309;
      --ok:        #2d6a4f;
      --crit:      #c0392b;
    }
    body.dark {
      --bg:          #0d0d0d;
      --bg-card:     #161616;
      --border:      #2a2a2a;
      --text:        #e8e8e8;
      --muted:       #888888;
      --faint:       #3a3a3a;
      --accent:      #ff8c69;
      --warn:        #f59e0b;
      --ok:          #4ade80;
      --crit:        #f87171;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font: 12px/1.6 'JetBrains Mono', 'Fira Mono', 'Cascadia Code', monospace;
      padding: 0;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: baseline;
      gap: 7px;
      padding: 11px 14px 9px;
      border-bottom: 1px solid var(--border);
    }
    #header .logo { color: var(--accent); font-weight: 700; font-size: 13px; }
    #header .title { font-size: 11px; font-weight: 700; color: var(--text); }
    #header .subtitle { margin-left: auto; font-size: 10px; color: var(--muted); }

    /* ── Usage blocks ── */
    .window {
      padding: 9px 0;
      border-bottom: 1px dashed var(--border);
    }
    .window:last-child { border-bottom: none; }

    .window-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .window-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }
    .window-pct {
      font-size: 12px;
      font-weight: 700;
    }
    .window-pct.critical { color: var(--crit); }
    .window-pct.warn     { color: var(--warn); }
    .window-pct.ok       { color: var(--ok); }

    /* full-width terminal bar */
    .term-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 5px;
      font-size: 12px;
      line-height: 1;
    }
    .bar-bracket { color: var(--muted); }
    .bar-track {
      flex: 1;
      height: 11px;
      background: var(--faint);
    }
    .bar-fill { height: 100%; }
    .bar-fill.ok       { background: var(--ok); }
    .bar-fill.warn     { background: var(--warn); }
    .bar-fill.critical { background: var(--crit); }

    .window-reset {
      font-size: 10px;
      color: var(--muted);
    }
    .window-reset .arrow { color: var(--accent); }

    /* ── Extra credits ── */
    .extra {
      padding: 9px 0 0;
      font-size: 10px;
      color: var(--muted);
      border-top: 1px dashed var(--border);
    }
    .extra .key { color: var(--accent); font-weight: 700; }

    /* ── Error ── */
    #error {
      padding: 8px 0;
      font-size: 11px;
      color: var(--crit);
      margin-bottom: 4px;
    }
    #error .err-label { font-weight: 700; }

    /* ── Status / footer ── */
    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 14px 10px;
      border-top: 1px solid var(--border);
      margin-top: 2px;
    }
    #status { font-size: 10px; color: var(--muted); }
    #refresh-btn,
    #theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 0;
      color: var(--muted);
      font: 10px/1.4 'JetBrains Mono', monospace;
      padding: 3px 7px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    #refresh-btn:hover,
    #theme-btn:hover { border-color: var(--accent); color: var(--accent); }
    #refresh-btn:disabled { opacity: 0.4; cursor: default; }

    #content { padding: 6px 14px 4px; }

  </style>
</head>
<body>
  <div id="header">
    <span class="logo">✳</span>
    <span class="title">claude-usage</span>
    <span class="subtitle" id="header-status">—</span>
  </div>

  <div id="content"></div>

  <div id="footer">
    <span id="status"></span>
    <div style="display:flex; gap:6px;">
	    <button id="theme-btn">theme</button>
            <button id="refresh-btn">⟳ refresh</button>
	</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
